<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>とおりすがりの和紅茶 — 売上管理（PC）</title>
<link rel="stylesheet" href="theme.css" />
<style>
  html, body { margin:0; padding:0; height:100%; }
  #root { height:100vh; }
  .pc-scroll::-webkit-scrollbar { width:10px; }
  .pc-scroll::-webkit-scrollbar-thumb { background:rgba(58,43,30,0.18); border-radius:6px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<template id="__bundler_thumbnail">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#E6D9BF"/>
    <rect x="20" y="62" width="12" height="16" fill="#6B4A2E"/>
    <rect x="36" y="50" width="12" height="28" fill="#6B4A2E"/>
    <rect x="52" y="40" width="12" height="38" fill="#B0402E"/>
    <rect x="68" y="55" width="12" height="23" fill="#6B4A2E"/>
  </svg>
</template>

<script type="text/babel" src="pos/data.jsx"></script>
<script type="text/babel" src="pc/charts.jsx"></script>
<script type="text/babel" src="pc/data-pc.jsx"></script>
<script type="text/babel" src="pc/views.jsx"></script>

<script type="text/babel">
const NAV = [
  { id:'sales',    t:'売上管理',   d:'M5 19V11M12 19V5M19 19v-5' },
  { id:'customer', t:'顧客分析',   d:'M9 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM3 20a6 6 0 0 1 12 0M17 11a3 3 0 0 0 0-6M21 20a6 6 0 0 0-4-5.7' },
];
const NAV2 = [
  { id:'prod',  t:'商品管理',       d:'M4 8l8-4 8 4-8 4zM4 8v8l8 4 8-4V8M12 12v8' },
  { id:'staff', t:'スタッフ管理',   d:'M12 11a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7zM5 20a7 7 0 0 1 14 0' },
  { id:'shop',  t:'店舗設定',       d:'M4 9l1.5-4h13L20 9M4 9h16v9a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1zM4 9a2 2 0 0 0 4 0 2 2 0 0 0 4 0 2 2 0 0 0 4 0 2 2 0 0 0 4 0' },
];

function NavI({ d }) {
  return <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor"
    strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d={d}/></svg>;
}

function App() {
  const [view, setView] = React.useState('sales');
  const title = view==='sales' ? '売上管理' : '顧客分析';
  const sub = view==='sales'
    ? '日次・月次・年次の売上推移と内訳'
    : '性別・年代別の客層と来店傾向';
  return (
    <div className="theme-roast paper-grain" style={{ width:'100%', height:'100%',
      background:'var(--paper)', color:'var(--ink)', fontFamily:'var(--gothic)',
      display:'flex', position:'relative', overflow:'hidden', minWidth:1180 }}>

      {/* sidebar */}
      <div style={{ width:248, flexShrink:0, background:'var(--bar)', color:'var(--bar-ink)',
        display:'flex', flexDirection:'column', position:'relative', zIndex:5, padding:'24px 18px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'0 6px 4px' }}>
          <img src="assets/logo-cream.png" alt="" style={{ height:30 }} />
          <div className="wordmark" style={{ fontSize:18, color:'var(--bar-ink)' }}>和紅茶</div>
        </div>
        <div style={{ fontSize:10.5, letterSpacing:'0.22em', color:'rgba(243,234,214,0.5)',
          fontWeight:700, padding:'0 6px 20px' }}>OWNER 管理コンソール</div>

        <div style={{ fontSize:10, letterSpacing:'0.2em', color:'rgba(243,234,214,0.4)',
          fontWeight:700, padding:'0 8px 8px' }}>分析</div>
        <div style={{ display:'flex', flexDirection:'column', gap:3, marginBottom:18 }}>
          {NAV.map(n=>{ const on=n.id===view;
            return <div key={n.id} onClick={()=>setView(n.id)} style={{ display:'flex', alignItems:'center',
              gap:11, padding:'12px 12px', borderRadius:10, cursor:'pointer',
              background:on?'var(--bar-ink)':'transparent', color:on?'var(--bar)':'rgba(243,234,214,0.82)',
              fontWeight:700, fontSize:14 }}>
              <NavI d={n.d} /><span>{n.t}</span></div>;
          })}
        </div>

        <div style={{ fontSize:10, letterSpacing:'0.2em', color:'rgba(243,234,214,0.4)',
          fontWeight:700, padding:'0 8px 8px' }}>運営</div>
        <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
          {NAV2.map(n=>(
            <div key={n.id} style={{ display:'flex', alignItems:'center', gap:11, padding:'12px 12px',
              borderRadius:10, cursor:'pointer', color:'rgba(243,234,214,0.6)', fontWeight:700, fontSize:14 }}>
              <NavI d={n.d} /><span style={{ flex:1 }}>{n.t}</span>
              <span style={{ fontSize:9, fontWeight:700, padding:'2px 6px', borderRadius:5,
                border:'1px solid rgba(243,234,214,0.3)' }}>アプリ</span>
            </div>
          ))}
        </div>

        <div style={{ marginTop:'auto', display:'flex', alignItems:'center', gap:10,
          padding:'14px 8px 0', borderTop:'1px solid rgba(243,234,214,0.15)' }}>
          <div style={{ width:36, height:36, borderRadius:'50%', background:'rgba(243,234,214,0.12)',
            display:'flex', alignItems:'center', justifyContent:'center', fontFamily:'var(--brush)',
            fontSize:17 }}>店</div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:13, fontWeight:700 }}>店長</div>
            <div style={{ fontSize:10.5, color:'rgba(243,234,214,0.5)' }}>オーナー</div>
          </div>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            strokeWidth="1.7" strokeLinecap="round" style={{ opacity:0.6 }}><path d="M16 17l5-5-5-5M21 12H9M12 19H5V5h7"/></svg>
        </div>
      </div>

      {/* main */}
      <div style={{ flex:1, minWidth:0, position:'relative', zIndex:2, display:'flex', flexDirection:'column' }}>
        {/* topbar */}
        <div style={{ display:'flex', alignItems:'center', gap:16, padding:'22px 32px 18px',
          borderBottom:'1.5px solid var(--line)' }}>
          <div>
            <div className="section-jp" style={{ fontSize:26 }}>{title}</div>
            <div style={{ fontSize:12.5, color:'var(--ink-mute)', marginTop:3 }}>{sub}</div>
          </div>
          <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:12 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, background:'var(--card-2)',
              border:'1.5px solid var(--line-2)', borderRadius:10, padding:'9px 14px', fontSize:13,
              fontWeight:700, color:'var(--ink-soft)' }}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                strokeWidth="1.7"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
              2026年6月
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                strokeWidth="2"><path d="M6 9l6 6 6-6"/></svg>
            </div>
            <button className="btn btn-accent" style={{ padding:'10px 18px', fontSize:13.5 }}>
              レポート出力</button>
          </div>
        </div>
        {/* scroll content */}
        <div className="pc-scroll" style={{ flex:1, overflowY:'auto', padding:'24px 32px 40px' }}>
          {view==='sales' ? <SalesView /> : <CustomerView />}
          <div style={{ textAlign:'center', marginTop:28, fontSize:11, color:'var(--ink-mute)' }}>
            最終更新 2026/06/04 14:42 · とおりすがりの和紅茶 POS 管理コンソール
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
